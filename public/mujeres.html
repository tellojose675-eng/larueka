<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mujeres</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  padding:12px;
  background:#f3f4f6;
  font-family:system-ui,sans-serif;
}

/* CARRITO */

.cart-icon{
  position:fixed;
  top:15px;
  right:15px;
  background:black;
  color:white;
  padding:12px 16px;
  border-radius:12px;
  cursor:pointer;
  z-index:9999;
  font-weight:bold;
  box-shadow:0 4px 10px rgba(0,0,0,.15);
  display:flex;
  align-items:center;
  gap:8px;
}

.cart-sidebar{
  position:fixed;
  top:0;
  right:-100%;
  width:380px;
  max-width:100%;
  height:100%;
  background:white;
  box-shadow:-5px 0 15px rgba(0,0,0,.1);
  transition:.35s ease;
  z-index:99999;
  display:flex;
  flex-direction:column;
}

.cart-sidebar.active{
  right:0;
}

.cart-header{
  padding:20px;
  border-bottom:1px solid #eee;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.cart-header h2{
  margin:0;
  font-size:22px;
}

.close-cart{
  cursor:pointer;
  font-size:28px;
  background:none;
  border:none;
}

#cart-items{
  flex:1;
  overflow-y:auto;
  padding:20px;
}

.cart-item{
  display:flex;
  gap:15px;
  margin-bottom:20px;
  align-items:center;
}

.cart-item img{
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:8px;
}

.cart-item-info{
  flex:1;
}

.cart-item-info h4{
  margin:0;
  font-size:14px;
}

.cart-item-info p{
  margin:4px 0;
  font-size:13px;
  color:#555;
}

.cart-controls{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:8px;
}

.qty-btn{
  width:26px;
  height:26px;
  border:none;
  border-radius:50%;
  background:#eee;
  cursor:pointer;
  font-weight:bold;
}

.remove-btn{
  border:none;
  background:none;
  color:red;
  cursor:pointer;
  font-size:12px;
  padding:0;
  margin-top:5px;
}

.cart-footer{
  padding:20px;
  border-top:1px solid #eee;
}

.cart-total{
  display:flex;
  justify-content:space-between;
  font-weight:bold;
  margin-bottom:15px;
}

.btn-checkout{
  width:100%;
  padding:14px;
  border:none;
  background:black;
  color:white;
  border-radius:8px;
  cursor:pointer;
  font-size:15px;
}

.btn-checkout:hover{
  background:#222;
}

/* PRODUCTOS */

.container{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:16px;
  width:100%;
  margin-top:70px;
}

.card{
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  border:1px solid #e5e7eb;
  box-shadow:0 2px 8px rgba(0,0,0,.05);
  display:flex;
  flex-direction:column;
  transition:.25s;
}

.card:hover{
  transform:translateY(-4px);
}

.card img{
  width:100%;
  height:230px;
  object-fit:cover;
  display:block;
}

.info{
  padding:10px;
  display:flex;
  flex-direction:column;
  flex-grow:1;
}

.info h3{
  margin:0 0 6px;
  font-size:14px;
  color:#111827;
  line-height:1.3;
}

.price{
  font-size:15px;
  font-weight:bold;
  margin-bottom:10px;
}

.btn-add{
  width:100%;
  border:none;
  background:#000;
  color:#fff;
  padding:10px;
  border-radius:8px;
  font-size:13px;
  cursor:pointer;
  margin-top:auto;
}

.btn-add:hover{
  background:#222;
}

/* TABLET */

@media(max-width:768px){

  .container{
    grid-template-columns:repeat(3,1fr);
    gap:12px;
  }

  .card img{
    height:190px;
  }

}

/* CELULAR */

@media(max-width:480px){

  body{
    padding:8px;
  }

  .container{
    grid-template-columns:repeat(2,1fr);
    gap:10px;
  }

  .card img{
    height:160px;
  }

  .cart-sidebar{
    width:100%;
  }

}

</style>

</head>

<body>

<!-- ICONO CARRITO -->

<div class="cart-icon" onclick="toggleCart()">

  🛒

  <span id="cart-count">
    0
  </span>

</div>

<!-- PANEL CARRITO -->

<div class="cart-sidebar" id="cart-sidebar">

  <div class="cart-header">

    <h2>Tu Carrito</h2>

    <button class="close-cart" onclick="toggleCart()">
      ×
    </button>

  </div>

  <div id="cart-items"></div>

  <div class="cart-footer">

    <div class="cart-total">

      <span>Total:</span>

      <span id="cart-total">
        S/. 0.00
      </span>

    </div>

    <button onclick="checkout()" class="btn-checkout">
      Finalizar Compra
    </button>

  </div>

</div>

<!-- PRODUCTOS -->

<div class="container" id="products"></div>

<script>

const API = "/products/category/mujer";

const container =
  document.getElementById("products");

let cart =
  JSON.parse(localStorage.getItem("cart")) || [];

/* GUARDAR */

function saveCart(){

  localStorage.setItem(
    "cart",
    JSON.stringify(cart)
  );

}

/* ABRIR CARRITO */

function toggleCart(){

  document
    .getElementById("cart-sidebar")
    .classList
    .toggle("active");

}

/* AGREGAR */

function addToCart(product){

  const existingItem =
    cart.find(
      item => item.id === product.id
    );

  if(existingItem){

    existingItem.quantity += 1;

  } else {

    cart.push({
      ...product,
      quantity:1
    });

  }

  saveCart();

  updateCartUI();

}

/* ELIMINAR */

function removeFromCart(id){

  cart =
    cart.filter(
      item => item.id !== id
    );

  saveCart();

  updateCartUI();

}

/* CAMBIAR CANTIDAD */

function updateQuantity(id, change){

  const item =
    cart.find(
      item => item.id === id
    );

  if(!item) return;

  item.quantity += change;

  if(item.quantity <= 0){

    removeFromCart(id);

    return;

  }

  saveCart();

  updateCartUI();

}

/* ACTUALIZAR UI */

function updateCartUI(){

  const cartItems =
    document.getElementById("cart-items");

  const cartCount =
    document.getElementById("cart-count");

  const cartTotal =
    document.getElementById("cart-total");

  cartItems.innerHTML = "";

  let total = 0;
  let count = 0;

  cart.forEach(item => {

    total +=
      item.price * item.quantity;

    count += item.quantity;

    cartItems.innerHTML += `

      <div class="cart-item">

        <img
          src="${item.image}"
          alt="${item.name}"
        >

        <div class="cart-item-info">

          <h4>${item.name}</h4>

          <p>
            S/. ${item.price}
          </p>

          <div class="cart-controls">

            <button
              class="qty-btn"
              onclick="updateQuantity(${item.id}, -1)"
            >
              -
            </button>

            <span>${item.quantity}</span>

            <button
              class="qty-btn"
              onclick="updateQuantity(${item.id}, 1)"
            >
              +
            </button>

          </div>

          <button
            class="remove-btn"
            onclick="removeFromCart(${item.id})"
          >
            Eliminar
          </button>

        </div>

      </div>

    `;

  });

  cartCount.innerText = count;

  cartTotal.innerText =
    `S/. ${total.toFixed(2)}`;

}

/* WHATSAPP */

function checkout(){

  if(cart.length === 0){

    alert("El carrito está vacío");

    return;

  }

  let message =
    "🛍️ *Nuevo Pedido*%0A%0A";

  let total = 0;

  cart.forEach(item => {

    const subtotal =
      item.price * item.quantity;

    total += subtotal;

    message +=
      `• ${item.name} (x${item.quantity}) - S/. ${subtotal}%0A`;

  });

  message +=
    `%0A💰 *Total:* S/. ${total.toFixed(2)}`;

  window.open(
    `https://wa.me/51996437285?text=${message}`,
    "_blank"
  );

}

/* CARGAR PRODUCTOS */

async function loadProducts(){

  try{

    const res =
      await fetch(API);

    const products =
      await res.json();

    container.innerHTML = "";

    if(!products || products.length === 0){

      container.innerHTML =
        "<p>No hay productos disponibles</p>";

      return;

    }

    products.forEach(p => {

      container.innerHTML += `

        <div class="card">

          <img
            src="${p.image}"
            alt="${p.name}"
          >

          <div class="info">

            <h3>${p.name}</h3>

            <div class="price">
              S/. ${p.price}
            </div>

            <button
              class="btn-add"
              onclick='addToCart(${JSON.stringify(p)})'
            >
              Agregar al Carrito
            </button>

          </div>

        </div>

      `;

    });

  } catch(error){

    console.log(error);

    container.innerHTML =
      "<p>Error cargando productos</p>";

  }

}

updateCartUI();

loadProducts();

</script>

</body>
</html>
