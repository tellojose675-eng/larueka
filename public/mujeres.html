<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mujeres</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  padding:12px;
  background:#f3f4f6;
  font-family:system-ui,sans-serif;
}

/* CARRITO */

.cart-icon-container{
  position:fixed;
  top:15px;
  right:15px;
  background:black;
  color:white;
  width:52px;
  height:52px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  z-index:9999;
  box-shadow:0 4px 12px rgba(0,0,0,.2);
  transition:.3s;
}

.cart-icon-container:hover{
  transform:scale(1.05);
}

.cart-badge{
  position:absolute;
  top:-5px;
  right:-5px;
  background:#ff3e3e;
  color:white;
  font-size:11px;
  padding:3px 7px;
  border-radius:50%;
  font-weight:bold;
}

.cart-overlay{
  position:fixed;
  top:0;
  right:-100%;
  width:400px;
  max-width:100%;
  height:100%;
  background:white;
  box-shadow:-5px 0 15px rgba(0,0,0,.1);
  transition:.35s ease-in-out;
  z-index:99999;
  display:flex;
  flex-direction:column;
}

.cart-overlay.active{
  right:0;
}

.cart-header{
  padding:20px;
  border-bottom:1px solid #eee;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.cart-header h3{
  margin:0;
  font-size:22px;
}

.close-cart{
  cursor:pointer;
  font-size:28px;
  background:none;
  border:none;
  color:black;
}

.cart-items{
  flex:1;
  overflow-y:auto;
  padding:20px;
}

.cart-item{
  display:flex;
  gap:15px;
  margin-bottom:20px;
  align-items:flex-start;
  border-bottom:1px solid #eee;
  padding-bottom:15px;
}

.cart-item img{
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:8px;
}

.cart-item-info{
  flex:1;
  display:flex;
  flex-direction:column;
}

.cart-item-info h4{
  margin:0;
  font-size:14px;
}

.cart-item-info p{
  margin:4px 0;
  font-size:13px;
  color:#666;
}

.cart-item-controls{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:8px;
}

.qty-btn{
  width:26px;
  height:26px;
  border:none;
  border-radius:50%;
  background:#eee;
  color:black;
  cursor:pointer;
  font-weight:bold;
  transition:.2s;
}

.qty-btn:hover{
  background:#ddd;
}

.cart-item-controls{
  display:flex;
  align-items:center;
  gap:8px;
  width:100%;
}

.remove-btn{
  margin-left:auto;
  background:none !important;
  border:none !important;
  outline:none;
  color:red;
  cursor:pointer;
  font-size:13px;
  padding:0;
}

.remove-btn:hover{
  color:#cc0000;
}

.cart-footer{
  padding:20px;
  border-top:1px solid #eee;
}

.cart-total{
  display:flex;
  justify-content:space-between;
  font-weight:600;
  margin-bottom:15px;
  font-size:16px;
}

.btn-checkout{
  width:100%;
  padding:14px;
  border:none;
  background:black;
  color:white;
  border-radius:8px;
  cursor:pointer;
  font-size:15px;
  transition:.3s;
}

.btn-checkout:hover{
  background:#222;
}

/* PRODUCTOS */

.container{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:16px;
  width:100%;
  margin-top:70px;
}

.card{
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  border:1px solid #e5e7eb;
  box-shadow:0 2px 8px rgba(0,0,0,.05);
  display:flex;
  flex-direction:column;
  transition:.25s;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:230px;
  object-fit:cover;
  display:block;
}

.info{
  padding:12px;
  display:flex;
  flex-direction:column;
  flex-grow:1;
}

.info h3{
  margin:0 0 6px;
  font-size:14px;
  color:#111827;
  line-height:1.3;
}

.price{
  font-size:15px;
  font-weight:bold;
  margin-bottom:12px;
}

.btn-add{
  width:100%;
  margin-top:auto;
  padding:12px;
  border:none;
  background:black;
  color:white;
  cursor:pointer;
  font-size:14px;
  border-radius:8px;
  transition:.3s;
}

.btn-add:hover{
  background:#333;
}

</style>

</head>

<body>

<!-- ICONO CARRITO (IGUAL) -->
<div class="cart-icon-container" onclick="toggleCart()">

  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <circle cx="9" cy="21" r="1"></circle>
    <circle cx="20" cy="21" r="1"></circle>
    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
  </svg>

  <span class="cart-badge" id="cart-count">0</span>

</div>

<!-- PANEL CARRITO -->
<div class="cart-overlay" id="cart-sidebar">

  <div class="cart-header">
    <h3>Tu Carrito</h3>
    <button class="close-cart" onclick="toggleCart()">×</button>
  </div>

  <div class="cart-items" id="cart-items"></div>

  <div class="cart-footer">

    <div class="cart-total">
      <span>Total:</span>
      <span id="cart-total-price">S/. 0.00</span>
    </div>

    <button onclick="checkout()" class="btn-checkout">
      Finalizar Compra
    </button>

  </div>

</div>

<!-- PRODUCTOS -->
<div class="container" id="products"></div>

<script>

const API = "/products/category/mujer"; // 👈 SOLO CAMBIO AQUÍ

const container =
  document.getElementById("products");

const cartSidebar =
  document.getElementById("cart-sidebar");

const cartItemsContainer =
  document.getElementById("cart-items");

const cartCount =
  document.getElementById("cart-count");

const cartTotalPrice =
  document.getElementById("cart-total-price");

let cart =
  JSON.parse(localStorage.getItem("cart")) || [];

function toggleCart(){
  cartSidebar.classList.toggle("active");
}

function saveCart(){
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCartUI();
}

function addToCart(product){

  const existingItem =
    cart.find(item => item.id === product.id);

  if(existingItem){
    existingItem.quantity += 1;
  } else {
    cart.push({...product, quantity:1});
  }

  saveCart();
}

function updateCartUI(){

  cartItemsContainer.innerHTML = "";

  let total = 0;
  let count = 0;

  cart.forEach(item => {

    total += item.price * item.quantity;
    count += item.quantity;

    cartItemsContainer.innerHTML += `
      <div class="cart-item">
        <img src="${item.image}" alt="${item.name}">
        <div class="cart-item-info">
          <h4>${item.name}</h4>
          <p>S/. ${item.price}</p>

          <div class="cart-item-controls">
            <button onclick="updateQuantity(${item.id}, -1)">-</button>
            <span>${item.quantity}</span>
            <button onclick="updateQuantity(${item.id}, 1)">+</button>
            <button class="remove-btn" onclick="removeFromCart(${item.id})">Eliminar</button>
          </div>

        </div>
      </div>
    `;
  });

  cartCount.innerText = count;
  cartTotalPrice.innerText = `S/. ${total.toFixed(2)}`;
}

async function loadProducts(){

  const res = await fetch(API);
  const products = await res.json();

  products.forEach(p => {

    container.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <div class="info">
          <h3>${p.name}</h3>
          <div class="price">S/. ${p.price}</div>
          <button class="btn-add" onclick='addToCart(${JSON.stringify(p)})'>
            Agregar al Carrito
          </button>
        </div>
      </div>
    `;

  });

}

updateCartUI();
loadProducts();

</script>

</body>
</html>
