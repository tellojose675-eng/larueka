<div class="container" id="products"></div>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    background-color: #f3f4f6;
    font-family: system-ui, -apple-system, sans-serif;
    margin: 0;
    padding: 16px;
  }

  /* PC */
  .container {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 18px;
    width: 100%;
  }

  /* CARD */
  .card {
    background: #ffffff;
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid #e5e7eb;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    display: flex;
    flex-direction: column;
    transition: 0.2s ease;
  }

  .card:hover {
    transform: translateY(-3px);
  }

  .card img {
    width: 100%;
    height: 230px;
    object-fit: cover;
    display: block;
  }

  .info {
    padding: 12px;
    display: flex;
    flex-direction: column;
    flex-grow: 1;
  }

  .info h3 {
    font-size: 14px;
    color: #111827;
    margin: 0 0 6px;
    font-weight: 500;
    line-height: 1.4;
  }

  .price {
    font-size: 15px;
    font-weight: 700;
    color: #000;
    margin-bottom: 12px;
  }

  .btn-add {
    background: #000;
    color: #fff;
    border: none;
    padding: 10px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    width: 100%;
    margin-top: auto;
  }

  .btn-add:hover {
    background: #222;
  }

  /* TABLET */
  @media (max-width: 768px) {
    .container {
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .card img {
      height: 200px;
    }
  }

  /* CELULAR */
  @media (max-width: 480px) {

    body {
      padding: 8px;
    }

    .container {
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .card {
      border-radius: 12px;
    }

    .card img {
      height: 170px;
    }

    .info {
      padding: 8px;
    }

    .info h3 {
      font-size: 12px;
      line-height: 1.3;
    }

    .price {
      font-size: 13px;
      margin-bottom: 8px;
    }

    .btn-add {
      padding: 8px;
      font-size: 11px;
      border-radius: 6px;
    }
  }
</style>

<script>
  const API = "/products/category/mujer";

  async function loadProducts() {
    try {
      const res = await fetch(API);
      const products = await res.json();
      const container = document.getElementById("products");

      container.innerHTML = "";

      if (products.length === 0) {
        container.innerHTML = "<p>No hay productos disponibles</p>";
        return;
      }

      products.forEach(p => {
        container.innerHTML += `
          <div class="card">
            <img src="${p.image}" alt="${p.name}">
            <div class="info">
              <h3>${p.name}</h3>
              <p class="price">S/. ${p.price}</p>
              <button class="btn-add">Agregar al Carrito</button>
            </div>
          </div>
        `;
      });

    } catch (error) {
      console.log(error);
      document.getElementById("products").innerHTML =
        "<p>Error cargando productos</p>";
    }
  }

  loadProducts();
</script>
