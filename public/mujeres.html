<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mujeres</title>

  <style>
    body{
      font-family: Arial;
      padding:20px;
      background:#f5f5f5;
    }

    h1{
      margin-bottom:20px;
    }

    .products{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
    }

    .card{
      background:white;
      padding:15px;
      border-radius:10px;
    }

    .card img{
      width:100%;
      height:250px;
      object-fit:cover;
      border-radius:10px;
    }

    .price{
      font-weight:bold;
      margin-top:10px;
    }
  </style>
</head>

<body>

  <h1>Productos para Mujer</h1>

  <div class="products" id="products"></div>

  <script>

    async function loadProducts(){

      const response =
        await fetch("/products/category/mujer");

      const products =
        await response.json();

      const container =
        document.getElementById("products");

      container.innerHTML = "";

      products.forEach(p => {

        container.innerHTML += `
          <div class="card">

            <img src="${p.image}">

            <h3>${p.name}</h3>

            <p class="price">
              S/. ${p.price}
            </p>

          </div>
        `;
      });
    }

    loadProducts();

  </script>

</body>
</html>
