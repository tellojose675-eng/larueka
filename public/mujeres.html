<div class="container" id="products"></div>

<style>
  body {
    background-color: #f3f4f6; /* Fondo gris claro */
    font-family: system-ui, -apple-system, sans-serif;
    margin: 0;
    padding: 20px;
  }

  .container {
    display: flex;
    flex-wrap: wrap;
    gap: 16px; /* Espacio entre tarjetas */
    justify-content: flex-start;
  }

  .card {
    background-color: #ffffff;
    border-radius: 12px; /* Bordes redondeados sutiles */
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); /* Sombra suave */
    width: 200px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    border: 1px solid #e5e7eb;
  }

  .card img {
    width: 100%;
    height: 200px;
    object-fit: cover; /* Ajusta la imagen sin deformarla */
  }

  .info {
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex-grow: 1;
  }

  .info h3 {
    font-size: 14px;
    color: #1f2937;
    margin: 0;
    font-weight: 500;
  }

  .price {
    font-size: 15px;
    font-weight: 600;
    color: #000000;
    margin: 0 0 12px 0;
  }

  .btn-add {
    background-color: #000000; /* Botón negro */
    color: #ffffff;
    border: none;
    padding: 10px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    width: 100%;
    margin-top: auto; /* Empuja el botón al fondo si cambian los altos */
    transition: background-color 0.2s ease;
  }

  .btn-add:hover {
    background-color: #262626;
  }
</style>

<script>

const API = "/products/category/mujer";

const container =
  document.getElementById("products");

const cartSidebar =
  document.getElementById("cart-sidebar");

const cartItemsContainer =
  document.getElementById("cart-items");

const cartCount =
  document.getElementById("cart-count");

const cartTotalPrice =
  document.getElementById("cart-total-price");

let cart =
  JSON.parse(localStorage.getItem("cart")) || [];

function toggleCart(){
  cartSidebar.classList.toggle("active");
}

async function loadProducts(){

  try{

    const response =
      await fetch(API);

    const data =
      await response.json();

    container.innerHTML = "";

    if(data.length === 0){

      container.innerHTML =
        "<p>No hay productos disponibles</p>";

      return;
    }

    data.forEach(product => {

      container.innerHTML += `

        <div class="card">

          <img
            src="${product.image}"
            alt="${product.name}"
            loading="lazy"
          >

          <div class="info">

            <h3>${product.name}</h3>

            <p>
              S/. ${product.price}
            </p>

            <button onclick='addToCart(${JSON.stringify(product)})'>
              Agregar al Carrito
            </button>

          </div>

        </div>

      `;

    });

    updateCartUI();

  } catch(err){

    console.log(err);

    container.innerHTML =
      "<p>Error cargando productos</p>";

  }

}

function addToCart(product){

  const existingItem =
    cart.find(item => item.id === product.id);

  if(existingItem){

    existingItem.quantity += 1;

  } else {

    cart.push({
      ...product,
      quantity:1
    });

  }

  saveCart();
  updateCartUI();

}

function removeFromCart(id){

  cart =
    cart.filter(item => item.id !== id);

  saveCart();
  updateCartUI();

}

function updateQuantity(id, delta){

  const item =
    cart.find(item => item.id === id);

  if(item){

    item.quantity += delta;

    if(item.quantity <= 0){

      removeFromCart(id);

    } else {

      saveCart();
      updateCartUI();

    }

  }

}

function saveCart(){

  localStorage.setItem(
    "cart",
    JSON.stringify(cart)
  );

}

function updateCartUI(){

  cartItemsContainer.innerHTML = "";

  let total = 0;
  let count = 0;

  cart.forEach(item => {

    total += item.price * item.quantity;
    count += item.quantity;

    cartItemsContainer.innerHTML += `

      <div class="cart-item">

        <img src="${item.image}">

        <div class="cart-item-info">

          <h4>${item.name}</h4>

          <p>
            S/. ${item.price}
          </p>

          <div class="cart-item-controls">

            <button onclick="updateQuantity(${item.id}, -1)">
              -
            </button>

            <span>${item.quantity}</span>

            <button onclick="updateQuantity(${item.id}, 1)">
              +
            </button>

          </div>

        </div>

        <button
          onclick="removeFromCart(${item.id})"
          style="
            width:auto;
            background:none;
            color:red;
            font-size:12px;
            padding:5px;
          "
        >
          Eliminar
        </button>

      </div>

    `;

  });

  cartCount.innerText = count;

  cartTotalPrice.innerText =
    `S/. ${total.toFixed(2)}`;

}

function checkout(){

  if(cart.length === 0){

    alert("El carrito está vacío");
    return;

  }

  const phoneNumber =
    "51996437285";

  let message =
    "🛍️ *Nuevo Pedido - Tienda de Ropa*%0A%0A";

  cart.forEach(item => {

    message +=
      `• ${item.name} (x${item.quantity}) - S/. ${item.price * item.quantity}%0A`;

  });

  message +=
    `%0A💰 *Total a pagar: ${cartTotalPrice.innerText}*`;

  window.open(
    `https://wa.me/${phoneNumber}?text=${message}`,
    "_blank"
  );

}

updateCartUI();
loadProducts();

</script>
