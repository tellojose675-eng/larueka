<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Gestión de Productos</title>

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --primary: #000000;
      --primary-hover: #333333;
      --bg: #fafafa;
      --card-bg: #ffffff;
      --text: #222222;
      --text-muted: #666666;
      --border: #dddddd;
      --danger: #ff3e3e;
      --admin-accent: #6366f1;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg);
      color: var(--text);
    }

    header {
      background: white;
      padding: 15px 5%;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    .actions {
      margin-bottom: 2rem;
      display: flex;
      justify-content: flex-end;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 5px;
      padding: 12px 24px;
      font-weight: 600;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-danger {
      background: transparent;
      border: 1px solid red;
      color: red;
    }

    .btn-edit {
      background: transparent;
      border: 1px solid var(--admin-accent);
      color: var(--admin-accent);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th,
    td {
      padding: 15px;
      border-bottom: 1px solid var(--border);
    }

    .product-img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 5px;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: white;
      width: 95%;
      max-width: 500px;
      padding: 2rem;
      border-radius: 10px;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 5px;
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 1rem;
    }

    .loader {
      display: flex;
      justify-content: center;
      padding: 2rem;
    }
  </style>
</head>

<body>

  <header>
    <h2>Panel Admin</h2>
    <a href="/">Ver tienda</a>
  </header>

  <!-- LOGIN -->
  <div id="login-overlay"
    style="position:fixed; inset:0; background:white; display:flex; justify-content:center; align-items:center; z-index:1000;">

    <div style="width:100%; max-width:400px; padding:2rem;">
      <h2 style="margin-bottom:20px;">Acceso Administrador</h2>

      <form id="login-form">

        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="admin-password" required>
        </div>

        <button type="submit" class="btn-primary" style="width:100%;">
          Ingresar
        </button>

        <p id="login-error"
          style="color:red; margin-top:10px; display:none;">
          Contraseña incorrecta
        </p>

      </form>
    </div>

  </div>

  <!-- CONTENIDO -->
  <div class="container" id="admin-content" style="display:none;">

    <div class="actions">
      <button class="btn-primary" onclick="openModal()">
        + Agregar Producto
      </button>
    </div>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Imagen</th>
          <th>Nombre</th>
          <th>Precio</th>
          <th>Acciones</th>
        </tr>
      </thead>

      <tbody id="product-tbody"></tbody>
    </table>

    <div id="loader" class="loader">
      Cargando...
    </div>

  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="product-modal">

    <div class="modal">

      <h2 id="modal-title">Agregar Producto</h2>

      <form id="product-form">

        <input type="hidden" id="product-id">

        <div class="form-group">
          <label>Nombre</label>
          <input type="text" id="name" required>
        </div>

        <div class="form-group">
          <label>Precio</label>
          <input type="number" id="price" step="0.01" required>
        </div>

        <div class="form-group">
          <label>Imagen</label>
          <input
            type="file"
            id="image"
            accept="image/*"
          >
        </div>

        <div class="modal-footer">
          <button type="button" onclick="closeModal()">
            Cancelar
          </button>

          <button type="submit" class="btn-primary">
            Guardar
          </button>
        </div>

      </form>

    </div>

  </div>

  <script>

    const API_URL = "/products";

    let products = [];

    const tbody =
      document.getElementById("product-tbody");

    const loader =
      document.getElementById("loader");

    const modal =
      document.getElementById("product-modal");

    const form =
      document.getElementById("product-form");

    // LOGIN

    const PASSWORD_CORRECTA = "admin123";

    document.getElementById("login-form")
      .onsubmit = (e) => {

        e.preventDefault();

        const pass =
          document.getElementById("admin-password").value;

        if (pass === PASSWORD_CORRECTA) {

          document.getElementById("login-overlay")
            .style.display = "none";

          document.getElementById("admin-content")
            .style.display = "block";

          loadProducts();

        } else {

          document.getElementById("login-error")
            .style.display = "block";

        }
      };

    // CARGAR PRODUCTOS

    async function loadProducts() {

      loader.style.display = "flex";

      try {

        const response =
          await fetch(API_URL);

        products =
          await response.json();

        renderProducts();

      } catch (error) {

        console.error(error);

      } finally {

        loader.style.display = "none";

      }
    }

    // RENDER

    function renderProducts() {

      tbody.innerHTML = "";

      products.forEach(p => {

        tbody.innerHTML += `
          <tr>

            <td>${p.id}</td>

            <td>
              <img
                src="${p.image}"
                class="product-img"
              >
            </td>

            <td>${p.name}</td>

            <td>S/. ${parseFloat(p.price).toFixed(2)}</td>

            <td>

              <button
                class="btn-edit"
                onclick="editProduct(${p.id})"
              >
                Editar
              </button>

              <button
                class="btn-danger"
                onclick="deleteProduct(${p.id})"
              >
                Eliminar
              </button>

            </td>

          </tr>
        `;
      });
    }

    // MODAL

    function openModal() {

      form.reset();

      document.getElementById("product-id").value = "";

      modal.classList.add("active");
    }

    function closeModal() {

      modal.classList.remove("active");
    }

    // EDITAR

    function editProduct(id) {

      const product =
        products.find(p => p.id === id);

      if (!product) return;

      document.getElementById("product-id").value =
        product.id;

      document.getElementById("name").value =
        product.name;

      document.getElementById("price").value =
        product.price;

      modal.classList.add("active");
    }

    // ELIMINAR

    async function deleteProduct(id) {

      if (!confirm("¿Eliminar producto?")) return;

      try {

        await fetch(`${API_URL}/${id}`, {
          method: "DELETE"
        });

        loadProducts();

      } catch (error) {

        console.error(error);

      }
    }

    // GUARDAR

    form.onsubmit = async (e) => {

      e.preventDefault();

      const id =
        document.getElementById("product-id").value;

      const formData = new FormData();

      formData.append(
        "name",
        document.getElementById("name").value
      );

      formData.append(
        "price",
        document.getElementById("price").value
      );

      const imageInput =
        document.getElementById("image");

      if (imageInput.files[0]) {

        formData.append(
          "image",
          imageInput.files[0]
        );
      }

      try {

        const response =
          await fetch(
            id
              ? `${API_URL}/${id}`
              : API_URL,
            {
              method: id ? "PUT" : "POST",
              body: formData
            }
          );

        if (response.ok) {

          closeModal();

          loadProducts();

        } else {

          alert("Error al guardar");

        }

      } catch (error) {

        console.error(error);

      }
    };

  </script>

</body>

</html>
