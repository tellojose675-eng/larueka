<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Gestión de Productos</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #000000;
      --primary-hover: #333333;
      --bg: #fafafa;
      --card-bg: #ffffff;
      --text: #222222;
      --text-muted: #666666;
      --border: #dddddd;
      --danger: #ff3e3e;
      --success: #22c55e;
      --admin-accent: #6366f1;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    header {
      background: white;
      padding: 15px 5%;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
      gap: 15px;
    }

    h1 {
      margin: 0;
      display: flex;
      align-items: center;
    }

    .logo {
      height: 100px;
      width: auto;
      object-fit: contain;
    }

    .logo-slogan {
      margin-left: 20px;
      font-size: 22px;
      font-weight: 700;
      color: #111;
      letter-spacing: 1px;
      text-transform: uppercase;
      line-height: 1.1;
      border-left: 3px solid var(--admin-accent);
      padding-left: 20px;
      max-width: 280px;
    }

    .container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    .actions {
      margin-bottom: 2rem;
      display: flex;
      justify-content: flex-end;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 5px;
      padding: 12px 24px;
      font-weight: 600;
      transition: all 0.3s;
      font-family: inherit;
    }

    .btn-primary {
      background-color: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background-color: var(--primary-hover);
    }

    .btn-secondary {
      background-color: #eee;
      color: var(--text);
    }

    .btn-danger {
      background-color: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
      padding: 8px 16px;
    }

    .btn-danger:hover {
      background-color: var(--danger);
      color: white;
    }

    .btn-edit {
      background-color: transparent;
      color: var(--admin-accent);
      border: 1px solid var(--admin-accent);
      padding: 8px 16px;
    }

    .btn-edit:hover {
      background-color: var(--admin-accent);
      color: white;
    }

    .table-responsive {
      width: 100%;
      overflow-x: auto;
      background: var(--card-bg);
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 600px; /* Asegura que la tabla no se aplaste en móviles */
    }

    th,
    td {
      padding: 1.25rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    th {
      background-color: #f1f1f1;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background-color: #f9f9f9;
    }

    .product-img {
      width: 60px;
      height: 60px;
      border-radius: 5px;
      object-fit: cover;
    }

    .badge {
      padding: 0.25rem 0.75rem;
      border-radius: 5px;
      font-size: 0.875rem;
      font-weight: 600;
      background: #eee;
      color: var(--text);
    }

    /* Modal Styles */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(2px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .modal-overlay.active {
      display: flex;
      opacity: 1;
    }

    .modal {
      background: var(--card-bg);
      width: 100%;
      max-width: 500px;
      border-radius: 1rem;
      padding: 2rem;
      border: 1px solid var(--border);
      transform: translateY(20px);
      transition: transform 0.3s;
    }

    .modal-overlay.active .modal {
      transform: translateY(0);
    }

    .modal-header {
      margin-bottom: 1.5rem;
    }

    .modal-title {
      font-size: 1.25rem;
      font-weight: 700;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    input {
      width: 100%;
      padding: 0.75rem;
      border-radius: 0.5rem;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 1rem;
      margin-top: 2rem;
    }

    .loader {
      display: flex;
      justify-content: center;
      padding: 3rem;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-left-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 768px) {
      header {
        justify-content: center;
        flex-direction: column;
        padding: 10px 20px;
      }

      .logo {
        height: 70px;
      }

      .logo-slogan {
        font-size: 14px;
        margin-left: 15px;
        padding-left: 15px;
        max-width: 180px;
      }

      .container {
        padding: 0 0.5rem;
        margin-top: 1rem;
      }

      .modal {
        width: 95%;
        margin: 10px;
        padding: 1.5rem;
      }

      .actions {
        justify-content: center;
      }
    }

    @media (max-width: 480px) {
      .logo {
        height: 55px;
      }

      .logo-slogan {
        font-size: 11px;
        margin-left: 10px;
        padding-left: 10px;
        max-width: 140px;
      }
      
      .btn-primary {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>
      <img src="laRueka.png" alt="La Rueka Logo" class="logo">
      <span class="logo-slogan">ROPA INTERIOR PARA TODA LA FAMILIA</span>
    </h1>
    <a href="/" style="color: var(--text-muted); text-decoration: none; font-size: 0.875rem;">Ver Tienda</a>
  </header>

  <!-- Overlay de Login -->
  <div id="login-overlay"
    style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center;">
    <div
      style="background: var(--card-bg); padding: 3rem; border-radius: 1rem; border: 1px solid var(--border); width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);">
      <div style="color: var(--primary); margin-bottom: 1.5rem;">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </div>
      <h2 style="margin-bottom: 2rem; font-weight: 700;">Acceso Restringido</h2>
      <form id="login-form">
        <div class="form-group" style="text-align: left;">
          <label>Contraseña de Administrador</label>
          <input type="password" id="admin-password" placeholder="••••••••" required autofocus>
        </div>
        <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Ingresar</button>
        <p id="login-error" style="color: var(--danger); font-size: 0.875rem; margin-top: 1rem; display: none;">
          Contraseña incorrecta</p>
      </form>
    </div>
  </div>

  <div class="container" id="admin-content" style="display: none;">
    <div class="actions">
      <button class="btn-primary" onclick="openModal('add')">+ Agregar Producto</button>
    </div>

    <div id="product-list-container">
      <div class="table-responsive">
        <table id="product-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Imagen</th>
              <th>Precio</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="product-tbody">
            <!-- Los productos se cargarán aquí -->
          </tbody>
        </table>
      </div>
      <div id="loader" class="loader">
        <div class="spinner"></div>
      </div>
    </div>
  </div>

  <!-- Modal Agregar/Editar -->
  <div class="modal-overlay" id="product-modal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Agregar Producto</h2>
      </div>
      <form id="product-form">
        <input type="hidden" id="product-id">
        <div class="form-group">
          <label for="name">Nombre del Producto</label>
          <input type="text" id="name" required placeholder="Ej: Camisa Slim Fit">
        </div>
        <div class="form-group">
          <label for="price">Precio (S/.)</label>
          <input type="number" id="price" step="0.01" required placeholder="Ej: 45.90">
        </div>
        <div class="form-group">
          <label for="image">URL de la Imagen</label>
          <input type="url" id="image" required placeholder="https://ejemplo.com/imagen.jpg">
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-secondary" onclick="closeModal()">Cancelar</button>
          <button type="submit" class="btn-primary" id="btn-save">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal Confirmar Eliminación -->
  <div class="modal-overlay" id="delete-modal">
    <div class="modal" style="max-width: 400px; text-align: center;">
      <div class="modal-header">
        <h2 class="modal-title">¿Eliminar Producto?</h2>
      </div>
      <p style="color: var(--text-muted); margin-bottom: 2rem;">Esta acción no se puede deshacer.</p>
      <div class="modal-footer" style="justify-content: center;">
        <button class="btn-secondary" onclick="closeDeleteModal()">Cancelar</button>
        <button class="btn-danger" id="btn-confirm-delete">Eliminar Permanentemente</button>
      </div>
    </div>
  </div>
  </div>

  <script>
    const API_URL = '/products';
    let products = [];
    const tbody = document.getElementById('product-tbody');
    const loader = document.getElementById('loader');
    const modal = document.getElementById('product-modal');
    const deleteModal = document.getElementById('delete-modal');
    const form = document.getElementById('product-form');
    const modalTitle = document.getElementById('modal-title');
    let productIdToDelete = null;

    // Cargar productos al iniciar
    async function loadProducts() {
      loader.style.display = 'flex';
      tbody.innerHTML = '';
      try {
        const response = await fetch(API_URL);
        products = await response.json();
        renderProducts();
      } catch (error) {
        console.error('Error:', error);
        alert('Error al cargar productos');
      } finally {
        loader.style.display = 'none';
      }
    }

    function renderProducts() {
      tbody.innerHTML = '';
      products.forEach(p => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
        <td><span class="badge">#${p.id}</span></td>
        <td style="font-weight: 600;">${p.name}</td>
        <td><img src="${p.image}" class="product-img" onerror="this.src='https://via.placeholder.com/50'"></td>
        <td>S/. ${parseFloat(p.price).toFixed(2)}</td>
        <td>
          <div style="display: flex; gap: 0.5rem;">
            <button class="btn-edit" onclick="openModal('edit', ${p.id})">Editar</button>
            <button class="btn-danger" onclick="confirmDelete(${p.id})">Eliminar</button>
          </div>
        </td>
      `;
        tbody.appendChild(tr);
      });
    }

    function openModal(mode, id = null) {
      form.reset();
      document.getElementById('product-id').value = '';

      if (mode === 'edit') {
        modalTitle.innerText = 'Editar Producto';
        const p = products.find(prod => prod.id === id);
        if (p) {
          document.getElementById('product-id').value = p.id;
          document.getElementById('name').value = p.name;
          document.getElementById('price').value = p.price;
          document.getElementById('image').value = p.image;
        }
      } else {
        modalTitle.innerText = 'Agregar Nuevo Producto';
      }

      modal.classList.add('active');
    }

    function closeModal() {
      modal.classList.remove('active');
    }

    function confirmDelete(id) {
      productIdToDelete = id;
      deleteModal.classList.add('active');
    }

    function closeDeleteModal() {
      deleteModal.classList.remove('active');
      productIdToDelete = null;
    }

    document.getElementById('btn-confirm-delete').onclick = async () => {
      if (productIdToDelete) {
        try {
          const response = await fetch(`${API_URL}/${productIdToDelete}`, { method: 'DELETE' });
          if (response.ok) {
            closeDeleteModal();
            loadProducts();
          } else {
            alert('Error al eliminar');
          }
        } catch (error) {
          console.error('Error:', error);
        }
      }
    };

    form.onsubmit = async (e) => {
      e.preventDefault();
      const id = document.getElementById('product-id').value;
      const productData = {
        name: document.getElementById('name').value,
        price: parseFloat(document.getElementById('price').value),
        image: document.getElementById('image').value
      };

      const method = id ? 'PUT' : 'POST';
      const url = id ? `${API_URL}/${id}` : API_URL;

      try {
        const response = await fetch(url, {
          method: method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(productData)
        });

        if (response.ok) {
          closeModal();
          loadProducts();
        } else {
          alert('Error al guardar el producto');
        }
      } catch (error) {
        console.error('Error:', error);
      }
    };

    // Cerrar modales al hacer clic fuera
    window.onclick = (e) => {
      if (e.target === modal) closeModal();
      if (e.target === deleteModal) closeDeleteModal();
    };

    // Lógica de Login
    const loginForm = document.getElementById('login-form');
    const loginOverlay = document.getElementById('login-overlay');
    const adminContent = document.getElementById('admin-content');
    const loginError = document.getElementById('login-error');
    const PASSWORD_CORRECTA = 'admin123'; // Puedes cambiar esta contraseña

    loginForm.onsubmit = (e) => {
      e.preventDefault();
      const passInput = document.getElementById('admin-password').value;

      if (passInput === PASSWORD_CORRECTA) {
        loginOverlay.style.display = 'none';
        adminContent.style.display = 'block';
        loadProducts();
      } else {
        loginError.style.display = 'block';
        document.getElementById('admin-password').value = '';
      }
    };

    // Carga inicial (solo si ya se logueó, pero por ahora pedirá siempre al recargar)
    // loadProducts(); // Quitamos esto de aquí para que solo cargue al ingresar el pass
  </script>


</body>

</html>
