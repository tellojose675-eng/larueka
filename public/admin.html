<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Admin - Gestión de Productos</title>
  <link rel="icon" type="image/png" href="laRueka.png">

  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap"
    rel="stylesheet"
  />

  <style>

    :root {
      --primary: #000000;
      --primary-hover: #333333;
      --bg: #fafafa;
      --card-bg: #ffffff;
      --text: #222222;
      --text-muted: #666666;
      --border: #dddddd;
      --danger: #ff3e3e;
      --admin-accent: #6366f1;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg);
      color: var(--text);
    }

    header {
      background: white;
      padding: 15px 5%;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    .actions {
      margin-bottom: 2rem;
      display: flex;
      justify-content: flex-end;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 5px;
      padding: 12px 24px;
      font-weight: 600;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-danger {
      background: transparent;
      border: 1px solid red;
      color: red;
    }

    .btn-edit {
      background: transparent;
      border: 1px solid var(--admin-accent);
      color: var(--admin-accent);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th,
    td {
      padding: 15px;
      border-bottom: 1px solid var(--border);
      text-align: left;
    }

    .product-img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 5px;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: white;
      width: 95%;
      max-width: 500px;
      padding: 2rem;
      border-radius: 10px;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    input,
    select {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 5px;
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 1rem;
    }

    .loader {
      display: flex;
      justify-content: center;
      padding: 2rem;
    }

    @media(max-width:768px){

      table{
        font-size:14px;
      }

      th,td{
        padding:10px;
      }

      button{
        padding:10px 14px;
      }

    }

  </style>
</head>

<body>

  <header>
    <h2>Panel Admin</h2>

    <a href="/">
      Ver tienda
    </a>
  </header>

  <!-- LOGIN -->

  <div
    id="login-overlay"
    style="
      position:fixed;
      inset:0;
      background:white;
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:1000;
    "
  >

    <div
      style="
        width:100%;
        max-width:400px;
        padding:2rem;
      "
    >

      <h2 style="margin-bottom:20px;">
        Acceso Administrador
      </h2>

      <form id="login-form">

        <div class="form-group">

          <label>Contraseña</label>

          <input
            type="password"
            id="admin-password"
            required
          >

        </div>

        <button
          type="submit"
          class="btn-primary"
          style="width:100%;"
        >
          Ingresar
        </button>

        <p
          id="login-error"
          style="
            color:red;
            margin-top:10px;
            display:none;
          "
        >
          Contraseña incorrecta
        </p>

      </form>

    </div>

  </div>

  <!-- CONTENIDO -->

  <div
    class="container"
    id="admin-content"
    style="display:none;"
  >

    <div class="actions" style="gap: 10px; justify-content: flex-end; display: flex;">

      <button
        class="btn-edit"
        onclick="openPasswordModal()"
      >
        Cambiar Contraseña
      </button>

      <button
        class="btn-primary"
        onclick="openModal()"
      >
        + Agregar Producto
      </button>

    </div>

    <table>

      <thead>

        <tr>
          <th>ID</th>
          <th>Imagen</th>
          <th>Nombre</th>
          <th>Precio</th>
          <th>Categoría</th>
          <th>Acciones</th>
        </tr>

      </thead>

      <tbody id="product-tbody"></tbody>

    </table>

    <div id="loader" class="loader">
      Cargando...
    </div>

  </div>

  <!-- MODAL -->

  <div class="modal-overlay" id="product-modal">

    <div class="modal">

      <h2 id="modal-title">
        Agregar Producto
      </h2>

      <form id="product-form">

        <input
          type="hidden"
          id="product-id"
        >

        <div class="form-group">

          <label>Nombre</label>

          <input
            type="text"
            id="name"
            required
          >

        </div>

        <div class="form-group">

          <label>Precio</label>

          <input
            type="number"
            id="price"
            step="0.01"
            required
          >

        </div>

        <div class="form-group">

          <label>Categoría</label>

          <select id="category" required>

            <option value="">
              Seleccionar
            </option>

            <option value="hombres">
              Hombre
            </option>

            <option value="mujeres">
              Mujer
            </option>

          </select>

        </div>

        <div class="form-group">

          <label>Imagen</label>

          <input
            type="file"
            id="image"
            accept="image/*"
          >

        </div>

        <div id="form-error" style="color:red; font-size:13px; margin-top:8px; display:none;"></div>

        <div class="modal-footer">

          <button
            type="button"
            onclick="closeModal()"
          >
            Cancelar
          </button>

          <button
            type="submit"
            class="btn-primary"
          >
            Guardar
          </button>

        </div>

      </form>

    </div>

  </div>

  <!-- PASSWORD MODAL -->

  <div class="modal-overlay" id="password-modal">

    <div class="modal">

      <h2>
        Cambiar Contraseña
      </h2>

      <form id="password-form">

        <div class="form-group">

          <label>Contraseña Actual</label>

          <input
            type="password"
            id="current-password"
            required
          >

        </div>

        <div class="form-group" style="margin-top: 1rem;">

          <label>Nueva Contraseña</label>

          <input
            type="password"
            id="new-password"
            required
          >

        </div>

        <div class="modal-footer">

          <button
            type="button"
            onclick="closePasswordModal()"
          >
            Cancelar
          </button>

          <button
            type="submit"
            class="btn-primary"
          >
            Actualizar
          </button>

        </div>

      </form>

    </div>

  </div>

  <script>

    const API_URL = "/products";

    let products = [];

    const tbody =
      document.getElementById("product-tbody");

    const loader =
      document.getElementById("loader");

    const modal =
      document.getElementById("product-modal");

    const form =
      document.getElementById("product-form");

    // LOGIN

    document.getElementById("login-form")
      .onsubmit = async (e) => {

        e.preventDefault();

        const pass =
          document.getElementById("admin-password").value;

        try {

          const response = await fetch("/admin/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password: pass })
          });

          if (response.ok) {

            document.getElementById("login-overlay")
              .style.display = "none";

            document.getElementById("admin-content")
              .style.display = "block";

            loadProducts();

          } else {

            const data = await response.json();
            const errorEl = document.getElementById("login-error");
            errorEl.innerText = data.error || "Contraseña incorrecta";
            errorEl.style.display = "block";

          }

        } catch (error) {

          console.error(error);
          alert("Error de conexión");

        }

      };

    // CAMBIAR CONTRASEÑA

    function openPasswordModal() {
      document.getElementById("password-form").reset();
      document.getElementById("password-modal").classList.add("active");
    }

    function closePasswordModal() {
      document.getElementById("password-modal").classList.remove("active");
    }

    document.getElementById("password-form")
      .onsubmit = async (e) => {
        e.preventDefault();

        const currentPassword = document.getElementById("current-password").value;
        const newPassword = document.getElementById("new-password").value;

        try {
          const response = await fetch("/admin/change-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ currentPassword, newPassword })
          });
          
          const data = await response.json();
          
          if (response.ok) {
            alert("Contraseña actualizada exitosamente.");
            closePasswordModal();
          } else {
            alert(data.error || "Error al actualizar contraseña");
          }
        } catch (error) {
          console.error(error);
          alert("Error de conexión");
        }
      };

    // CARGAR PRODUCTOS

    async function loadProducts() {

      loader.style.display = "flex";

      try {

        const response =
          await fetch(API_URL);

        products =
          await response.json();

        renderProducts();

      } catch (error) {

        console.error(error);

      } finally {

        loader.style.display = "none";

      }

    }

    // MOSTRAR PRODUCTOS

    function renderProducts() {

      tbody.innerHTML = "";

      products.forEach(p => {

        tbody.innerHTML += `

          <tr>

            <td>${p.id}</td>

            <td>

              <img
                src="${p.image}"
                class="product-img"
              >

            </td>

            <td>${p.name}</td>

            <td>
              S/. ${parseFloat(p.price).toFixed(2)}
            </td>

            <td>
              ${p.category || "-"}
            </td>

            <td>

              <button
                class="btn-edit"
                onclick="editProduct(${p.id})"
              >
                Editar
              </button>

              <button
                class="btn-danger"
                onclick="deleteProduct(${p.id})"
              >
                Eliminar
              </button>

            </td>

          </tr>

        `;

      });

    }

    // ABRIR MODAL

    function openModal() {

      form.reset();

      document.getElementById("product-id").value = "";

      document.getElementById("modal-title").innerText =
        "Agregar Producto";

      modal.classList.add("active");

    }

    // CERRAR MODAL

    function closeModal() {

      modal.classList.remove("active");

    }

    // EDITAR

    function editProduct(id) {

      const product =
        products.find(p => p.id === id);

      if (!product) return;

      document.getElementById("modal-title").innerText =
        "Editar Producto";

      document.getElementById("product-id").value =
        product.id;

      document.getElementById("name").value =
        product.name;

      document.getElementById("price").value =
        product.price;

      document.getElementById("category").value =
        product.category || "";

      modal.classList.add("active");

    }

    // ELIMINAR

    async function deleteProduct(id) {

      if (!confirm("¿Eliminar producto?")) return;

      try {

        await fetch(`${API_URL}/${id}`, {
          method: "DELETE"
        });

        loadProducts();

      } catch (error) {

        console.error(error);

      }

    }

    // GUARDAR PRODUCTO

    form.onsubmit = async (e) => {

      e.preventDefault();

      const errorEl = document.getElementById("form-error");
      errorEl.style.display = "none";

      const id = document.getElementById("product-id").value;
      const imageInput = document.getElementById("image");

      if (!id && !imageInput.files[0]) {
        errorEl.innerText = "⚠️ Debes seleccionar una imagen para el producto.";
        errorEl.style.display = "block";
        return;
      }

      const formData = new FormData();
      formData.append("name", document.getElementById("name").value);
      formData.append("price", document.getElementById("price").value);
      formData.append("category", document.getElementById("category").value);

      if (imageInput.files[0]) {
        formData.append("image", imageInput.files[0]);
      }

      try {

        const response = await fetch(
          id ? `${API_URL}/${id}` : API_URL,
          { method: id ? "PUT" : "POST", body: formData }
        );

        if (response.ok) {
          closeModal();
          loadProducts();
        } else {
          const data = await response.json();
          errorEl.innerText = "❌ " + (data.error || "Error al guardar");
          errorEl.style.display = "block";
        }

      } catch (error) {
        console.error(error);
        errorEl.innerText = "❌ Error de conexión. Intenta nuevamente.";
        errorEl.style.display = "block";
      }

    };

  </script>

</body>

</html>
