<!-- IMPORTANTE -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ICONO CARRITO -->
<div class="cart-icon-container" onclick="toggleCart()">

  <svg
    width="24"
    height="24"
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="2"
  >

    <circle cx="9" cy="21" r="1"></circle>

    <circle cx="20" cy="21" r="1"></circle>

    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>

  </svg>

  <span class="cart-badge" id="cart-count">
    0
  </span>

</div>

<!-- PANEL CARRITO -->
<div class="cart-overlay" id="cart-sidebar">

  <div class="cart-header">

    <h3>Tu Carrito</h3>

    <span class="close-cart" onclick="toggleCart()">
      &times;
    </span>

  </div>

  <div class="cart-items" id="cart-items"></div>

  <div class="cart-footer">

    <div class="cart-total">

      <span>Total:</span>

      <span id="cart-total-price">
        S/. 0.00
      </span>

    </div>

    <button onclick="checkout()">
      Finalizar Compra
    </button>

  </div>

</div>

<div class="container" id="products"></div>

<style>

  *{
    box-sizing:border-box;
  }

  body{
    margin:0;
    padding:12px;
    background:#f3f4f6;
    font-family:system-ui,sans-serif;
  }

  /* CARRITO */

  .cart-icon-container{
    position:fixed;
    top:15px;
    right:15px;
    background:black;
    color:white;
    width:50px;
    height:50px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    z-index:9999;
    box-shadow:0 4px 12px rgba(0,0,0,.2);
  }

  .cart-badge{
    position:absolute;
    top:-5px;
    right:-5px;
    background:#ff3e3e;
    color:white;
    font-size:11px;
    padding:3px 7px;
    border-radius:50%;
    font-weight:bold;
  }

  .cart-overlay{
    position:fixed;
    top:0;
    right:-100%;
    width:400px;
    height:100%;
    background:white;
    box-shadow:-5px 0 15px rgba(0,0,0,0.1);
    transition:0.4s ease-in-out;
    z-index:99999;
    display:flex;
    flex-direction:column;
  }

  .cart-overlay.active{
    right:0;
  }

  .cart-header{
    padding:20px;
    border-bottom:1px solid #eee;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }

  .close-cart{
    cursor:pointer;
    font-size:24px;
  }

  .cart-items{
    flex:1;
    overflow-y:auto;
    padding:20px;
  }

  .cart-item{
    display:flex;
    gap:15px;
    margin-bottom:20px;
    align-items:center;
  }

  .cart-item img{
    width:60px;
    height:60px;
    object-fit:cover;
    border-radius:5px;
  }

  .cart-item-info{
    flex:1;
  }

  .cart-item-info h4{
    margin:0;
    font-size:14px;
  }

  .cart-item-info p{
    margin:2px 0;
    font-size:13px;
    color:#666;
  }

  .cart-item-controls{
    display:flex;
    align-items:center;
    gap:10px;
  }

  .cart-item-controls button{
    width:25px;
    height:25px;
    padding:0;
    font-size:14px;
    border-radius:50%;
    background:#eee;
    color:black;
    border:none;
    cursor:pointer;
  }

  .cart-footer{
    padding:20px;
    border-top:1px solid #eee;
  }

  .cart-total{
    display:flex;
    justify-content:space-between;
    font-weight:600;
    margin-bottom:15px;
  }

  /* PRODUCTOS */

  .container{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:16px;
    width:100%;
    margin-top:70px;
  }

  .card{
    background:#fff;
    border-radius:14px;
    overflow:hidden;
    border:1px solid #e5e7eb;
    box-shadow:0 2px 8px rgba(0,0,0,.05);
    display:flex;
    flex-direction:column;
  }

  .card img{
    width:100%;
    height:230px;
    object-fit:cover;
    display:block;
  }

  .info{
    padding:10px;
    display:flex;
    flex-direction:column;
    flex-grow:1;
  }

  .info h3{
    margin:0 0 6px;
    font-size:14px;
    color:#111827;
    line-height:1.3;
  }

  .price{
    font-size:15px;
    font-weight:bold;
    margin-bottom:10px;
  }

  .btn-add{
    width:100%;
    border:none;
    background:#000;
    color:#fff;
    padding:10px;
    border-radius:8px;
    font-size:13px;
    cursor:pointer;
    margin-top:auto;
  }

  .btn-add:hover{
    background:#222;
  }

  @media(max-width:768px){

    .container{
      grid-template-columns:repeat(3,1fr);
      gap:12px;
    }

    .card img{
      height:190px;
    }

  }

  @media(max-width:480px){

    body{
      padding:8px;
    }

    .container{
      grid-template-columns:repeat(2,1fr);
      gap:10px;
    }

    .card img{
      height:160px;
    }

    .cart-overlay{
      width:100%;
    }

  }

</style>

<script>

  const API = "/products/category/hombre";

  const cartSidebar =
    document.getElementById("cart-sidebar");

  const cartItemsContainer =
    document.getElementById("cart-items");

  const cartCount =
    document.getElementById("cart-count");

  const cartTotalPrice =
    document.getElementById("cart-total-price");

  let cart =
    JSON.parse(localStorage.getItem("cart")) || [];

  function toggleCart(){

    cartSidebar.classList.toggle("active");

  }

  function saveCart(){

    localStorage.setItem(
      "cart",
      JSON.stringify(cart)
    );

  }

  function addToCart(product){

    const existingItem =
      cart.find(item => item.id === product.id);

    if(existingItem){

      existingItem.quantity += 1;

    } else {

      cart.push({
        ...product,
        quantity:1
      });

    }

    saveCart();

    updateCartUI();

  }

  function removeFromCart(id){

    cart =
      cart.filter(item => item.id !== id);

    saveCart();

    updateCartUI();

  }

  function updateQuantity(id, delta){

    const item =
      cart.find(item => item.id === id);

    if(item){

      item.quantity += delta;

      if(item.quantity <= 0){

        removeFromCart(id);

      } else {

        saveCart();

        updateCartUI();

      }

    }

  }

  function updateCartUI(){

    cartItemsContainer.innerHTML = "";

    let total = 0;
    let count = 0;

    cart.forEach(item => {

      total += item.price * item.quantity;

      count += item.quantity;

      cartItemsContainer.innerHTML += `

        <div class="cart-item">

          <img src="${item.image}">

          <div class="cart-item-info">

            <h4>${item.name}</h4>

            <p>
              S/. ${item.price}
            </p>

            <div class="cart-item-controls">

              <button onclick="updateQuantity(${item.id}, -1)">
                -
              </button>

              <span>${item.quantity}</span>

              <button onclick="updateQuantity(${item.id}, 1)">
                +
              </button>

            </div>

          </div>

          <button
            onclick="removeFromCart(${item.id})"
            style="
              width:auto;
              background:none;
              color:red;
              font-size:12px;
              padding:5px;
            "
          >
            Eliminar
          </button>

        </div>

      `;

    });

    cartCount.innerText = count;

    cartTotalPrice.innerText =
      `S/. ${total.toFixed(2)}`;

  }

  function checkout(){

    if(cart.length === 0){

      alert("El carrito está vacío");

      return;

    }

    let message =
      "🛍️ *Nuevo Pedido*%0A%0A";

    cart.forEach(item => {

      message +=
        `• ${item.name} (x${item.quantity}) - S/. ${item.price * item.quantity}%0A`;

    });

    message +=
      `%0A💰 *Total: ${cartTotalPrice.innerText}*`;

    window.open(
      `https://wa.me/51996437285?text=${message}`,
      "_blank"
    );

  }

  async function loadProducts(){

    try{

      const res =
        await fetch(API);

      const products =
        await res.json();

      const container =
        document.getElementById("products");

      container.innerHTML = "";

      if(!products || products.length === 0){

        container.innerHTML =
          "<p>No hay productos disponibles</p>";

        return;

      }

      products.forEach(p => {

        container.innerHTML += `

          <div class="card">

            <img
              src="${p.image}"
              alt="${p.name}"
            >

            <div class="info">

              <h3>${p.name}</h3>

              <div class="price">
                S/. ${p.price}
              </div>

              <button
                class="btn-add"
                onclick='addToCart(${JSON.stringify(p)})'
              >
                Agregar al Carrito
              </button>

            </div>

          </div>

        `;

      });

    } catch(error){

      console.log(error);

      document.getElementById("products").innerHTML =
        "<p>Error cargando productos</p>";

    }

  }

  updateCartUI();

  loadProducts();

</script>
