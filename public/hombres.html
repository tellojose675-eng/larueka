<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hombres</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  padding:12px;
  background:#f3f4f6;
  font-family:system-ui,sans-serif;
}

/* ================= CARRITO ICONO (IGUAL AL INDEX) ================= */

.cart-icon-container{
  position:fixed;
  top:15px;
  right:15px;
  background:black;
  color:white;
  width:52px;
  height:52px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  z-index:9999;
  box-shadow:0 4px 12px rgba(0,0,0,.2);
  transition:.3s;
}

.cart-icon-container:hover{
  transform:scale(1.05);
}

.cart-badge{
  position:absolute;
  top:-5px;
  right:-5px;
  background:#ff3e3e;
  color:white;
  font-size:11px;
  padding:3px 7px;
  border-radius:50%;
  font-weight:bold;
}

/* ================= CARRITO ================= */

.cart-overlay{
  position:fixed;
  top:0;
  right:-100%;
  width:400px;
  max-width:100%;
  height:100%;
  background:white;
  box-shadow:-5px 0 15px rgba(0,0,0,.1);
  transition:.35s ease-in-out;
  z-index:99999;
  display:flex;
  flex-direction:column;
}

.cart-overlay.active{
  right:0;
}

.cart-header{
  padding:20px;
  border-bottom:1px solid #eee;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.cart-items{
  flex:1;
  overflow-y:auto;
  padding:20px;
}

.cart-item{
  display:flex;
  gap:15px;
  margin-bottom:20px;
  border-bottom:1px solid #eee;
  padding-bottom:15px;
}

.cart-item img{
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:8px;
}

.cart-footer{
  padding:20px;
  border-top:1px solid #eee;
}

.btn-checkout{
  width:100%;
  padding:14px;
  border:none;
  background:black;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

.container{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:16px;
  margin-top:70px;
}

.card{
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  border:1px solid #e5e7eb;
}

.card img{
  width:100%;
  height:230px;
  object-fit:cover;
}

.info{
  padding:12px;
}

.btn-add{
  width:100%;
  padding:12px;
  border:none;
  background:black;
  color:white;
  cursor:pointer;
  border-radius:8px;
}

</style>

</head>

<body>

<!-- ICONO IGUAL AL INDEX -->
<div class="cart-icon-container" onclick="toggleCart()">

  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <circle cx="9" cy="21" r="1"></circle>
    <circle cx="20" cy="21" r="1"></circle>
    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
  </svg>

  <span class="cart-badge" id="cart-count">0</span>

</div>

<!-- CARRITO -->
<div class="cart-overlay" id="cart-sidebar">

  <div class="cart-header">
    <h3>Tu Carrito</h3>
    <button onclick="toggleCart()">×</button>
  </div>

  <div class="cart-items" id="cart-items"></div>

  <div class="cart-footer">
    <div id="cart-total-price">S/. 0.00</div>
    <button class="btn-checkout" onclick="checkout()">Finalizar Compra</button>
  </div>

</div>

<!-- PRODUCTOS -->
<div class="container" id="products"></div>

<script>

const API = "/products/category/hombre";

let cart = JSON.parse(localStorage.getItem("cart")) || [];

const cartSidebar = document.getElementById("cart-sidebar");
const cartItemsContainer = document.getElementById("cart-items");
const cartCount = document.getElementById("cart-count");
const cartTotalPrice = document.getElementById("cart-total-price");

function toggleCart(){
  cartSidebar.classList.toggle("active");
}

function saveCart(){
  localStorage.setItem("cart", JSON.stringify(cart));
}

function addToCart(product){

  const item = cart.find(p => p.id === product.id);

  if(item){
    item.quantity++;
  }else{
    cart.push({...product, quantity:1});
  }

  saveCart();
  updateCartUI();
}

function updateCartUI(){

  cartItemsContainer.innerHTML = "";

  let total = 0;
  let count = 0;

  cart.forEach(item => {

    total += item.price * item.quantity;
    count += item.quantity;

    cartItemsContainer.innerHTML += `
      <div class="cart-item">
        <img src="${item.image}">
        <div>
          <h4>${item.name}</h4>
          <p>S/. ${item.price}</p>
        </div>
      </div>
    `;

  });

  cartCount.innerText = count;
  cartTotalPrice.innerText = `S/. ${total.toFixed(2)}`;
}

async function loadProducts(){

  const res = await fetch(API);
  const data = await res.json();

  const container = document.getElementById("products");

  data.forEach(p => {

    container.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <div class="info">
          <h3>${p.name}</h3>
          <p>S/. ${p.price}</p>
          <button class="btn-add" onclick='addToCart(${JSON.stringify(p)})'>
            Agregar
          </button>
        </div>
      </div>
    `;

  });

}

updateCartUI();
loadProducts();

</script>

</body>
</html>
