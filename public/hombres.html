<!-- IMPORTANTE -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<div class="container" id="products"></div>

<style>
  *{
    box-sizing: border-box;
  }

  body{
    margin: 0;
    padding: 12px;
    background: #f3f4f6;
    font-family: system-ui, sans-serif;
  }

  /* PC */
  .container{
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 16px;
    width: 100%;
  }

  .card{
    background: #fff;
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid #e5e7eb;
    box-shadow: 0 2px 8px rgba(0,0,0,.05);
    display: flex;
    flex-direction: column;
  }

  .card img{
    width: 100%;
    height: 230px;
    object-fit: cover;
    display: block;
  }

  .info{
    padding: 10px;
    display: flex;
    flex-direction: column;
    flex-grow: 1;
  }

  .info h3{
    margin: 0 0 6px;
    font-size: 14px;
    color: #111827;
    line-height: 1.3;
  }

  .price{
    font-size: 15px;
    font-weight: bold;
    margin-bottom: 10px;
  }

  .btn-add{
    width: 100%;
    border: none;
    background: #000;
    color: #fff;
    padding: 10px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    margin-top: auto;
  }

  /* TABLET */
  @media (max-width: 768px){

    .container{
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .card img{
      height: 190px;
    }
  }

  /* CELULAR */
  @media (max-width: 480px){

    body{
      padding: 8px;
    }

    .container{
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .card{
      border-radius: 10px;
    }

    .card img{
      height: 160px;
    }

    .info{
      padding: 8px;
    }

    .info h3{
      font-size: 12px;
    }

    .price{
      font-size: 13px;
      margin-bottom: 8px;
    }

    .btn-add{
      font-size: 11px;
      padding: 8px;
      border-radius: 6px;
    }
  }
</style>

<script>

  const API = "/products/category/hombre";

  let cart =
    JSON.parse(localStorage.getItem("cart")) || [];

  function saveCart() {

    localStorage.setItem(
      "cart",
      JSON.stringify(cart)
    );

  }

  function addToCart(product) {

    const existingItem =
      cart.find(item => item.id === product.id);

    if(existingItem){

      existingItem.quantity += 1;

    } else {

      cart.push({
        ...product,
        quantity: 1
      });

    }

    saveCart();

    alert("Producto agregado al carrito");

  }

  async function loadProducts() {

    try {

      const res =
        await fetch(API);

      const products =
        await res.json();

      const container =
        document.getElementById("products");

      container.innerHTML = "";

      if(products.length === 0){

        container.innerHTML =
          "<p>No hay productos disponibles</p>";

        return;

      }

      products.forEach(p => {

        container.innerHTML += `

          <div class="card">

            <img
              src="${p.image}"
              alt="${p.name}"
            >

            <div class="info">

              <h3>${p.name}</h3>

              <div class="price">
                S/. ${p.price}
              </div>

              <button
                class="btn-add"
                onclick='addToCart(${JSON.stringify(p)})'
              >
                Agregar al Carrito
              </button>

            </div>

          </div>

        `;

      });

    } catch(error){

      console.log(error);

      document.getElementById("products").innerHTML =
        "<p>Error cargando productos</p>";

    }

  }

  loadProducts();

</script>
