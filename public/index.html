<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Tienda de Ropa</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #fafafa;
      color: #222;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 5%;
      background: white;
      border-bottom: 1px solid #ddd;
      position: sticky;
      top: 0;
      z-index: 1000;
      flex-wrap: wrap;
      gap: 15px;
    }

    header h1 {
      margin: 0;
      display: flex;
      align-items: center;
    }

    .logo {
      height: 100px;
      width: auto;
      object-fit: contain;
    }

    .logo-slogan {
      margin-left: 20px;
      font-size: 22px;
      font-weight: 700;
      color: #111;
      letter-spacing: 1px;
      text-transform: uppercase;
      line-height: 1.1;
      border-left: 3px solid #000;
      padding-left: 20px;
      max-width: 280px;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    nav a {
      text-decoration: none;
      color: #222;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: color 0.3s;
      white-space: nowrap;
    }

    nav a:hover {
      color: black;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      transition: 0.3s;
      border: 1px solid #eee;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .info {
      padding: 15px;
    }

    h3 {
      margin: 0;
      font-size: 16px;
      font-weight: 500;
    }

    p {
      margin: 5px 0;
      font-weight: 600;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      border: none;
      background: black;
      color: white;
      cursor: pointer;
      font-size: 15px;
      transition: 0.3s;
    }

    button:hover {
      background: #333;
    }

    @media (max-width: 768px) {
      header {
        padding: 10px 20px;
        justify-content: center;
        flex-direction: column;
      }

      .logo {
        height: 70px;
      }

      .logo-slogan {
        font-size: 14px;
        margin-left: 15px;
        padding-left: 15px;
        max-width: 180px;
      }

      nav {
        gap: 15px;
      }

      nav a {
        font-size: 12px;
      }

      .container {
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 15px;
        padding: 15px;
      }

      .card h3 {
        font-size: 14px;
      }

      img {
        height: 180px;
      }
    }

    @media (max-width: 480px) {
      .container {
        grid-template-columns: 1fr 1fr; /* Dos columnas en móviles muy pequeños */
        gap: 10px;
        padding: 10px;
      }
      
      .logo {
        height: 55px;
      }

      .logo-slogan {
        font-size: 11px;
        margin-left: 10px;
        padding-left: 10px;
        max-width: 140px;
      }
      
      nav a {
        font-size: 11px;
      }
    }

    /* Estilos del Carrito */
    .cart-overlay {
      position: fixed;
      top: 0;
      right: -100%;
      width: 400px;
      height: 100%;
      background: white;
      box-shadow: -5px 0 15px rgba(0,0,0,0.1);
      transition: 0.4s ease-in-out;
      z-index: 1000;
      display: flex;
      flex-direction: column;
    }

    .cart-overlay.active {
      right: 0;
    }

    .cart-header {
      padding: 20px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cart-items {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .cart-item {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
      align-items: center;
    }

    .cart-item img {
      width: 60px;
      height: 60px;
      border-radius: 5px;
    }

    .cart-item-info {
      flex: 1;
    }

    .cart-item-info h4 {
      margin: 0;
      font-size: 14px;
    }

    .cart-item-info p {
      margin: 2px 0;
      font-size: 13px;
      color: #666;
    }

    .cart-item-controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .cart-item-controls button {
      width: 25px;
      height: 25px;
      padding: 0;
      font-size: 14px;
      border-radius: 50%;
      background: #eee;
      color: black;
    }

    .cart-footer {
      padding: 20px;
      border-top: 1px solid #eee;
    }

    .cart-total {
      display: flex;
      justify-content: space-between;
      font-weight: 600;
      margin-bottom: 15px;
    }

    .close-cart {
      cursor: pointer;
      font-size: 24px;
    }

    .cart-icon-container {
      position: relative;
      cursor: pointer;
      margin-left: 20px;
    }

    .cart-badge {
      position: absolute;
      top: -8px;
      right: -10px;
      background: #ff3e3e;
      color: white;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 10px;
      font-weight: bold;
    }

    @media (max-width: 450px) {
      .cart-overlay {
        width: 100%;
      }
    }

    /* Estilos del Carrusel */
    .carousel-container {
      width: 100%;
      max-width: 1200px;
      margin: 20px auto;
      overflow: hidden;
      border-radius: 15px;
      position: relative;
      height: 400px;
      background: transparent;
    }

    .carousel-slide {
      display: flex;
      width: 100%;
      height: 100%;
      transition: transform 0.6s ease;
    }

    .carousel-item {
      min-width: 100%; /* Cada imagen ocupa el 100% del contenedor */
      height: 100%;
      object-fit: cover;
    }

    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: transparent !important; /* Forzar transparencia */
      border: none;
      padding: 20px;
      cursor: pointer;
      color: white;
      font-size: 40px;
      z-index: 10;
      text-shadow: 0 0 10px rgba(0,0,0,0.8);
      transition: 0.3s;
      opacity: 0;
      width: auto !important; /* Evitar que ocupe el 100% */
      margin-top: 0 !important; /* Quitar margen del botón global */
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .carousel-container:hover .carousel-btn {
      opacity: 1;
    }

    .carousel-btn:hover {
      transform: translateY(-50%) scale(1.2);
    }

    .prev { left: 10px; }
    .next { right: 10px; }

    @media (max-width: 768px) {
      .carousel-container {
        height: 250px;
        margin: 10px;
        border-radius: 10px;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>
    <img src="laRueka.png" alt="La Rueka" class="logo">
    <span class="logo-slogan">ROPA INTERIOR PARA TODA LA FAMILIA</span>
  </h1>
  <nav>
    <a href="#">Inicio</a>
    <a href="#">Hombres</a>
    <a href="#">Mujeres</a>
    <a href="#">Contacto</a>
    <a href="/admin" title="Panel Administrativo" style="display: flex; align-items: center; color: #6366f1;">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
    </a>
    <div class="cart-icon-container" onclick="toggleCart()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
      <span class="cart-badge" id="cart-count">0</span>
    </div>
  </nav>
</header>

<div class="cart-overlay" id="cart-sidebar">
  <div class="cart-header">
    <h3>Tu Carrito</h3>
    <span class="close-cart" onclick="toggleCart()">&times;</span>
  </div>
  <div class="cart-items" id="cart-items">
    <!-- Items dinámicos -->
  </div>
  <div class="cart-footer">
    <div class="cart-total">
      <span>Total:</span>
      <span id="cart-total-price">S/. 0.00</span>
    </div>
    <button onclick="checkout()">Finalizar Compra</button>
  </div>
</div>

<div class="carousel-container">
  <div class="carousel-slide" id="carousel-slide">
    <img src="https://images.unsplash.com/photo-1441986300917-64674bd600d8?auto=format&fit=crop&q=80&w=1600" class="carousel-item" alt="Banner 1">
    <img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b?auto=format&fit=crop&q=80&w=1600" class="carousel-item" alt="Banner 2">
  </div>
  <button class="carousel-btn prev" onclick="moveSlide(-1)">&#10094;</button>
  <button class="carousel-btn next" onclick="moveSlide(1)">&#10095;</button>
</div>

<div class="container" id="products"></div>

<script>
const API = "/products";

const container = document.getElementById("products");
const cartSidebar = document.getElementById("cart-sidebar");
const cartItemsContainer = document.getElementById("cart-items");
const cartCount = document.getElementById("cart-count");
const cartTotalPrice = document.getElementById("cart-total-price");

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function toggleCart() {
  cartSidebar.classList.toggle("active");
}

fetch(API)
  .then(res => res.json())
  .then(data => {
    container.innerHTML = "";

    data.forEach(product => {
      container.innerHTML += `
        <div class="card">
          <img src="${product.image}" loading="lazy">
          <div class="info">
            <h3>${product.name}</h3>
            <p>S/. ${product.price}</p>
            <button onclick='addToCart(${JSON.stringify(product)})'>Agregar al Carrito</button>
          </div>
        </div>
      `;
    });
    updateCartUI();
  })
  .catch(err => {
    container.innerHTML = "<p>Error cargando productos</p>";
    console.log(err);
  });

function addToCart(product) {
  const existingItem = cart.find(item => item.id === product.id);
  
  if (existingItem) {
    existingItem.quantity += 1;
  } else {
    cart.push({ ...product, quantity: 1 });
  }
  
  saveCart();
  updateCartUI();
  
  // Opcional: Abrir el carrito al agregar
  // toggleCart();
}

function removeFromCart(id) {
  cart = cart.filter(item => item.id !== id);
  saveCart();
  updateCartUI();
}

function updateQuantity(id, delta) {
  const item = cart.find(item => item.id === id);
  if (item) {
    item.quantity += delta;
    if (item.quantity <= 0) {
      removeFromCart(id);
    } else {
      saveCart();
      updateCartUI();
    }
  }
}

function saveCart() {
  localStorage.setItem("cart", JSON.stringify(cart));
}

function updateCartUI() {
  cartItemsContainer.innerHTML = "";
  let total = 0;
  let count = 0;

  cart.forEach(item => {
    total += item.price * item.quantity;
    count += item.quantity;

    cartItemsContainer.innerHTML += `
      <div class="cart-item">
        <img src="${item.image}">
        <div class="cart-item-info">
          <h4>${item.name}</h4>
          <p>S/. ${item.price}</p>
          <div class="cart-item-controls">
            <button onclick="updateQuantity(${item.id}, -1)">-</button>
            <span>${item.quantity}</span>
            <button onclick="updateQuantity(${item.id}, 1)">+</button>
          </div>
        </div>
        <button onclick="removeFromCart(${item.id})" style="width: auto; background: none; color: red; font-size: 12px; padding: 5px;">Eliminar</button>
      </div>
    `;
  });

  cartCount.innerText = count;
  cartTotalPrice.innerText = `S/. ${total.toFixed(2)}`;
}

function checkout() {
  if (cart.length === 0) {
    alert("El carrito está vacío");
    return;
  }

  const phoneNumber = "51996437285"; // Reemplaza con tu número de WhatsApp (ej: 51987654321)
  let message = "🛍️ *Nuevo Pedido - Tienda de Ropa*\n\n";
  
  cart.forEach(item => {
    message += `• ${item.name} (x${item.quantity}) - S/. ${item.price * item.quantity}\n`;
  });

  message += `\n💰 *Total a pagar: ${cartTotalPrice.innerText}*`;

  const encodedMessage = encodeURIComponent(message);
  const whatsappURL = `https://wa.me/${phoneNumber}?text=${encodedMessage}`;

  window.open(whatsappURL, "_blank");

  // Vaciar el carrito después de enviar el pedido
  cart = [];
  saveCart();
  updateCartUI();
  toggleCart();
}

// Lógica del Carrusel
let currentSlide = 0;
const slide = document.getElementById("carousel-slide");

function moveSlide(direction) {
  currentSlide += direction;
  if (currentSlide > 1) currentSlide = 0;
  if (currentSlide < 0) currentSlide = 1;
  slide.style.transform = `translateX(-${currentSlide * 100}%)`;
}

// Cambio automático cada 5 segundos
setInterval(() => moveSlide(1), 5000);
</script>

</body>
</html>
