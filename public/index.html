<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Tienda de Ropa</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap"
    rel="stylesheet"
  >

  <style>

    body{
      margin:0;
      font-family:'Inter',sans-serif;
      background:#fafafa;
      color:#222;
    }

    header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px 5%;
      background:white;
      border-bottom:1px solid #ddd;
      position:sticky;
      top:0;
      z-index:1000;
      flex-wrap:wrap;
      gap:15px;
    }

    header h1{
      margin:0;
      display:flex;
      align-items:center;
    }

    .logo{
      height:100px;
      width:auto;
      object-fit:contain;
    }

    .logo-slogan{
      margin-left:20px;
      font-size:22px;
      font-weight:700;
      color:#111;
      letter-spacing:1px;
      text-transform:uppercase;
      line-height:1.1;
      border-left:3px solid #000;
      padding-left:20px;
      max-width:280px;
    }

    nav{
      display:flex;
      align-items:center;
      gap:20px;
      flex-wrap:wrap;
      justify-content:center;
    }

    nav a{
      text-decoration:none;
      color:#222;
      font-size:13px;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:0.5px;
      transition:0.3s;
    }

    nav a:hover{
      color:black;
    }

    .container{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      padding:20px;
    }

    .card{
      background:white;
      border-radius:10px;
      overflow:hidden;
      border:1px solid #eee;
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-5px);
      box-shadow:0 10px 25px rgba(0,0,0,0.1);
    }

    .card img{
      width:100%;
      height:220px;
      object-fit:cover;
    }

    .info{
      padding:15px;
    }

    .info h3{
      margin:0;
      font-size:16px;
    }

    .info p{
      margin:5px 0;
      font-weight:600;
    }

    button{
      width:100%;
      margin-top:10px;
      padding:12px;
      border:none;
      background:black;
      color:white;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#333;
    }

    .cart-icon-container{
      position:relative;
      cursor:pointer;
    }

    .cart-badge{
      position:absolute;
      top:-8px;
      right:-10px;
      background:red;
      color:white;
      font-size:10px;
      padding:2px 6px;
      border-radius:10px;
      font-weight:bold;
    }

    .cart-overlay{
      position:fixed;
      top:0;
      right:-100%;
      width:400px;
      height:100%;
      background:white;
      box-shadow:-5px 0 15px rgba(0,0,0,0.1);
      transition:0.4s;
      z-index:2000;
      display:flex;
      flex-direction:column;
    }

    .cart-overlay.active{
      right:0;
    }

    .cart-header{
      padding:20px;
      border-bottom:1px solid #eee;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .close-cart{
      cursor:pointer;
      font-size:24px;
    }

    .cart-items{
      flex:1;
      overflow-y:auto;
      padding:20px;
    }

    .cart-item{
      display:flex;
      gap:15px;
      margin-bottom:20px;
    }

    .cart-item img{
      width:60px;
      height:60px;
      border-radius:5px;
      object-fit:cover;
    }

    .cart-item-info{
      flex:1;
    }

    .cart-item-controls{
      display:flex;
      align-items:center;
      gap:10px;
      margin-top:5px;
    }

    .cart-item-controls button{
      width:25px;
      height:25px;
      padding:0;
      border-radius:50%;
      background:#eee;
      color:black;
    }

    .cart-footer{
      padding:20px;
      border-top:1px solid #eee;
    }

    .cart-total{
      display:flex;
      justify-content:space-between;
      margin-bottom:15px;
      font-weight:600;
    }

    .carousel-container{
      width:100%;
      max-width:1200px;
      margin:20px auto;
      overflow:hidden;
      border-radius:15px;
      position:relative;
      height:400px;
    }

    .carousel-slide{
      display:flex;
      transition:transform 0.6s ease;
      height:100%;
    }

    .carousel-item{
      min-width:100%;
      height:100%;
      object-fit:cover;
    }

    .carousel-btn{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      background:transparent;
      border:none;
      color:white;
      font-size:40px;
      cursor:pointer;
      padding:15px;
      z-index:10;
    }

    .prev{
      left:10px;
    }

    .next{
      right:10px;
    }

    @media(max-width:768px){

      .logo{
        height:70px;
      }

      .logo-slogan{
        font-size:14px;
        max-width:180px;
      }

      .container{
        grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
      }

      .carousel-container{
        height:250px;
      }

    }

  </style>

</head>

<body>

<header>

  <h1>

    <img
      src="laRueka.png"
      alt="La Rueka"
      class="logo"
    >

    <span class="logo-slogan">
      ROPA INTERIOR PARA TODA LA FAMILIA
    </span>

  </h1>

  <nav>

    <a href="/">
      Inicio
    </a>

    <a href="/hombres">
      Hombres
    </a>

    <a href="/mujeres">
      Mujeres
    </a>

    <a
      href="/admin"
      style="
        display:flex;
        align-items:center;
        color:#6366f1;
      "
    >
      Admin
    </a>

    <div
      class="cart-icon-container"
      onclick="toggleCart()"
    >

      🛒

      <span
        class="cart-badge"
        id="cart-count"
      >
        0
      </span>

    </div>

  </nav>

</header>

<!-- CARRUSEL -->

<div class="carousel-container">

  <div
    class="carousel-slide"
    id="carousel-slide"
  >

    <img
      src="https://images.unsplash.com/photo-1441986300917-64674bd600d8?auto=format&fit=crop&q=80&w=1600"
      class="carousel-item"
    >

    <img
      src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b?auto=format&fit=crop&q=80&w=1600"
      class="carousel-item"
    >

  </div>

  <button
    class="carousel-btn prev"
    onclick="moveSlide(-1)"
  >
    ❮
  </button>

  <button
    class="carousel-btn next"
    onclick="moveSlide(1)"
  >
    ❯
  </button>

</div>

<!-- PRODUCTOS -->

<div
  class="container"
  id="products"
></div>

<!-- CARRITO -->

<div
  class="cart-overlay"
  id="cart-sidebar"
>

  <div class="cart-header">

    <h3>
      Tu Carrito
    </h3>

    <span
      class="close-cart"
      onclick="toggleCart()"
    >
      ×
    </span>

  </div>

  <div
    class="cart-items"
    id="cart-items"
  ></div>

  <div class="cart-footer">

    <div class="cart-total">

      <span>Total:</span>

      <span id="cart-total-price">
        S/. 0.00
      </span>

    </div>

    <button onclick="checkout()">
      Finalizar Compra
    </button>

  </div>

</div>

<script>

const API = "/products";

const container =
  document.getElementById("products");

const cartSidebar =
  document.getElementById("cart-sidebar");

const cartItemsContainer =
  document.getElementById("cart-items");

const cartCount =
  document.getElementById("cart-count");

const cartTotalPrice =
  document.getElementById("cart-total-price");

let cart =
  JSON.parse(localStorage.getItem("cart")) || [];

// TOGGLE CARRITO

function toggleCart(){
  cartSidebar.classList.toggle("active");
}

// CARGAR PRODUCTOS

fetch(API)
  .then(res => res.json())
  .then(data => {

    container.innerHTML = "";

    data.forEach(product => {

      container.innerHTML += `
        <div class="card">

          <img
            src="${product.image}"
            alt="${product.name}"
            loading="lazy"
          >

          <div class="info">

            <h3>${product.name}</h3>

            <p>S/. ${product.price}</p>

            <button onclick='addToCart(${JSON.stringify(product)})'>
              Agregar al carrito
            </button>

          </div>

        </div>
      `;
    });

    updateCartUI();

  });

// AGREGAR CARRITO

function addToCart(product){

  const existing =
    cart.find(item => item.id === product.id);

  if(existing){

    existing.quantity++;

  }else{

    cart.push({
      ...product,
      quantity:1
    });

  }

  saveCart();
  updateCartUI();

}

// GUARDAR

function saveCart(){
  localStorage.setItem("cart", JSON.stringify(cart));
}

// ACTUALIZAR UI

function updateCartUI(){

  cartItemsContainer.innerHTML = "";

  let total = 0;
  let count = 0;

  cart.forEach(item => {

    total += item.price * item.quantity;
    count += item.quantity;

    cartItemsContainer.innerHTML += `
      <div class="cart-item">

        <img src="${item.image}">

        <div class="cart-item-info">

          <h4>${item.name}</h4>

          <p>S/. ${item.price}</p>

          <div class="cart-item-controls">

            <button onclick="updateQuantity(${item.id},-1)">
              -
            </button>

            <span>${item.quantity}</span>

            <button onclick="updateQuantity(${item.id},1)">
              +
            </button>

          </div>

        </div>

      </div>
    `;

  });

  cartCount.innerText = count;

  cartTotalPrice.innerText =
    `S/. ${total.toFixed(2)}`;

}

// CANTIDAD

function updateQuantity(id,delta){

  const item =
    cart.find(item => item.id === id);

  if(item){

    item.quantity += delta;

    if(item.quantity <= 0){

      cart =
        cart.filter(i => i.id !== id);

    }

    saveCart();
    updateCartUI();

  }

}

// CHECKOUT

function checkout(){

  if(cart.length === 0){
    alert("El carrito está vacío");
    return;
  }

  const phoneNumber = "51996437285";

  let message =
    "🛍️ Nuevo Pedido%0A%0A";

  cart.forEach(item => {

    message +=
      `${item.name} x${item.quantity} - S/. ${item.price * item.quantity}%0A`;

  });

  message += `%0ATotal: ${cartTotalPrice.innerText}`;

  window.open(
    `https://wa.me/${phoneNumber}?text=${message}`,
    "_blank"
  );

}

// CARRUSEL

let currentSlide = 0;

const slide =
  document.getElementById("carousel-slide");

function moveSlide(direction){

  currentSlide += direction;

  if(currentSlide > 1){
    currentSlide = 0;
  }

  if(currentSlide < 0){
    currentSlide = 1;
  }

  slide.style.transform =
    `translateX(-${currentSlide * 100}%)`;

}

setInterval(() => {
  moveSlide(1);
},5000);

</script>

</body>
</html>
